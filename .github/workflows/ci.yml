name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --prefer-offline --legacy-peer-deps
      - run: npm run lint

  test:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --prefer-offline --legacy-peer-deps
      - run: npm run test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      AUTH_SECRET: ci-test-secret-not-used-in-production
      SKIP_AUTH: "true"
      NEXT_PUBLIC_USE_MOCK: "true"
      # Valeurs factices pour satisfaire l'init next-auth (jamais appelées en CI)
      ZITADEL_ISSUER: https://ci-dummy.zitadel.cloud
      ZITADEL_CLIENT_ID: ci-dummy-client-id
      ZITADEL_CLIENT_SECRET: ci-dummy-client-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --prefer-offline --legacy-peer-deps
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  ci-ok:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi

  build-push:
    name: Build & Push → ghcr.io
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/healthai-corpo/healthai-web:latest
            ghcr.io/healthai-corpo/healthai-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            ZITADEL_ISSUER=${{ secrets.ZITADEL_ISSUER }}
            ZITADEL_CLIENT_ID=${{ secrets.ZITADEL_CLIENT_ID }}
            ZITADEL_CLIENT_SECRET=${{ secrets.ZITADEL_CLIENT_SECRET }}